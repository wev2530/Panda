<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="subscribe.css">
</head>
<body>
        <div class="main-container">
          <div class="flex-row-aef">
            <div class="rectangle">
              <div class="ellipse"></div>
              <div class="polygon"></div>
              <span class="ceo">( CEO )</span><span class="henry">Henry</span>
            </div>
            <span class="bronze">Bronze</span><span class="slash">1/7</span>
            <div class="d-b"></div>
            <div class="arrow"></div>
            <div class="rectangle-1"><div class="rectangle-2"></div></div>
          </div>
          <div class="flex-row">
            <div class="d-b-3"></div>
            <span class="profit-o-hr">profit:o/hr</span><span class="zero">0</span>
          </div>
          <div class="rectangle-4">
            <span class="perform-tasks">PERFORM TASKS</span
            ><span class="receive-bonuses">For you to receive bonuses</span>
            <div class="frame">
              <div class="subscribe-task">
                <div class="rectangle-5"></div>
                <span class="subscribe">Subscribe</span>
                <div class="vector"></div>
                <div class="arrow-6"></div>
                <div class="d-b-7"></div>
                <span class="plus-10-000">+10,000</span>
              </div>
              <div class="subscribe-task-8">
                <div class="rectangle-9"></div>
                <span class="follow">Follow</span>
                <div class="vector-a"></div>
                <div class="arrow-b"></div>
                <div class="d-b-c"></div>
                <span class="plus-five-thousand">+5,000</span>
              </div>
              <div class="subscribe-task-d">
                <div class="rectangle-e"></div>
                <span class="like">Like</span>
                <div class="vector-f"></div>
                <div class="arrow-10"></div>
                <div class="d-b-11"></div>
                <span class="plus-one-thousand">+1,000</span>
              </div>
              <div class="subscribe-task-12">
                <div class="rectangle-13"></div>
                <span class="subscribe-14">Subscribe</span>
                <div class="vector-15"></div>
                <div class="arrow-16"></div>
                <div class="d-b-17"></div>
                <span class="plus-ten-thousand">+10,000</span>
              </div>
              <div class="subscribe-task-18">
                <div class="rectangle-19"></div>
                <span class="subscribe-1a">Subscribe</span>
                <div class="vector-1b"></div>
                <div class="arrow-1c"></div>
                <div class="d-b-1d"></div>
                <span class="plus-10k">+10,000</span>
              </div>
              <div class="subscribe-task-1e">
                <div class="rectangle-1f"></div>
                <span class="subscribe-20">Subscribe</span>
                <div class="vector-21"></div>
                <div class="arrow-22"></div>
                <div class="d-b-23"></div>
                <span class="plus-10k-24">+10,000</span>
              </div>
              <div class="subscribe-task-25">
                <div class="rectangle-26"></div>
                <span class="subscribe-27">Subscribe</span>
                <div class="vector-28"></div>
                <div class="arrow-29"></div>
                <div class="d-b-2a"></div>
                <span class="span-plus">+10,000</span>
              </div>
            </div>
          </div>
          <div class="rectangle-2b">
            <div class="frame-2c">
              <div class="group"></div>
              <div class="friends"></div>
              <div class="vector-2d"></div>
              <div class="d-b-2e"></div>
            </div>
            <div class="flex-row-c">
              <span class="span-mine">Mine</span
              ><span class="span-friends">Friends</span
              ><span class="span-tasks">Tasks</span
              ><span class="span-airdrop">Airdrop</span>
            </div>
          </div>
          <div class="rectangle-2f"></div>
        </div>
</body>
</html>
